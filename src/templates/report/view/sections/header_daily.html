
        <!-- ==========================================================
             Header - Daily layout
             ========================================================== -->
        <header class="report-header-v3">
            <div class="report-header-center report-header-banner">
                <img src="{{ meta.header_background_uri }}" alt="" class="report-header-background" aria-hidden="true">
                <div class="report-header-overlay">
                    <div class="report-banner-logo-slot">
                        <div class="report-banner-logo-crop">
                            <img src="{{ meta.company_logo_uri }}" alt="AkzoNobel" class="report-banner-logo-image">
                        </div>
                    </div>

                    <div class="report-banner-copy">
                        <h1 class="report-main-title">ENERGY REPORT</h1>
                        <p class="report-hero-subtitle">Daily automatic report • Energy performance overview</p>
                        <div class="report-meta-line">
                            <span class="report-meta-line-icon">
                                {% include "assets/icon/calendar.svg" %}
                            </span>
                            <span class="report-meta-line-label">Created:</span>
                            <span class="report-meta-line-value">{{ generated_at }}</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="report-header-divider"></div>
