<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ meta.report_title or "Energy Consumption Report" }}</title>

    <style>
        {% include "assets/vendor/bootstrap/bootstrap.min.css" %}
    </style>
    <style>
        {% include "assets/report.css" %}
    </style>
    {% if report_style_css %}
    <style>
        {{ report_style_css | safe }}
    </style>
    {% endif %}
    <script src="https://cdn.jsdelivr.net/npm/echarts@6.0.0/dist/echarts.min.js"></script>
    <script>
        if (!window.echarts) {
            {% include "assets/vendor/echarts/echarts.min.js" %}
        }
    </script>
    <script>
        (function () {
            if (!window.echarts) {
                return;
            }

            var reportChartThemeName = {{ (chart_theme_name or 'report_default') | tojson }};
            var reportChartTheme = {{ (chart_theme_json or '{}') | safe }};
            echarts.registerTheme(reportChartThemeName, reportChartTheme);
            window.REPORT_CHART_THEME_NAME = reportChartThemeName;
        })();
    </script>
    <script>
        window.__scheduleReportChartInit = function (initFn) {
            let attempts = 0;
            const maxAttempts = 18;

            function finalize() {
                window.setTimeout(function () {
                    window.dispatchEvent(new Event("resize"));
                }, 120);
                window.setTimeout(function () {
                    window.dispatchEvent(new Event("beforeprint"));
                }, 320);
            }

            function run() {
                attempts += 1;
                const ready = initFn();
                if (ready === false && attempts < maxAttempts) {
                    window.setTimeout(run, 140);
                    return;
                }
                finalize();
            }

            function schedule() {
                window.requestAnimationFrame(function () {
                    window.requestAnimationFrame(run);
                });
            }

            if (document.readyState === "loading") {
                window.addEventListener("load", schedule, { once: true });
            } else {
                schedule();
            }
        };
    </script>
</head>
{% set report_scope = 'daily' if period.type == 'daily' else 'periodic' %}
<body class="report-body report-family-{{ report_scope }} report-period-{{ period.type | default('unknown') }}">
    <div class="report-container report-container-{{ report_scope }}">
        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
