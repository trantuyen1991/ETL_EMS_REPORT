<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ meta.report_title or "Energy Consumption Report" }}</title>

    <style>
        {% include "assets/report_pdf_base.css" %}
    </style>
    <script>
        {% include "assets/vendor/echarts/echarts.min.js" %}
    </script>
    <script>
        window.status = "loading";
        window.__pdfDebug = {
            startedAt: Date.now(),
            readyDelayMs: 15000,
            events: [],
        };

        window.__pdfDebugLog = function (tag, payload) {
            const event = {
                t: Date.now() - window.__pdfDebug.startedAt,
                tag: tag,
                payload: payload || {},
            };
            window.__pdfDebug.events.push(event);
            try {
                console.log("[PDF_DEBUG]", JSON.stringify(event));
            } catch (error) {
                console.log("[PDF_DEBUG]", tag, payload || {});
            }
        };

        window.__pdfDebugLog("bootstrap", {
            readyState: document.readyState,
            url: window.location.href,
        });

        window.__reportChartTasks = {};

        window.__markReportTask = function (name, patch) {
            const current = window.__reportChartTasks[name] || {
                name: name,
                scheduled: false,
                completed: false,
                success: false,
                attempts: 0,
            };
            window.__reportChartTasks[name] = Object.assign(current, patch || {});
            window.__pdfDebugLog("task.update", window.__reportChartTasks[name]);
        };

        window.__allReportTasksDone = function () {
            const taskNames = Object.keys(window.__reportChartTasks);
            if (!taskNames.length) {
                return false;
            }
            return taskNames.every(function (taskName) {
                return !!window.__reportChartTasks[taskName].completed;
            });
        };

        window.__scheduleReportChartInit = function (name, initFn) {
            let attempts = 0;
            const maxAttempts = 24;
            window.__markReportTask(name, {
                scheduled: true,
                completed: false,
                success: false,
                attempts: 0,
            });

            function finalize() {
                window.__pdfDebugLog("schedule.finalize", {
                    name: name,
                    attempts: attempts,
                });
                window.setTimeout(function () {
                    window.__pdfDebugLog("event.dispatch", {
                        name: name,
                        type: "resize",
                    });
                    window.dispatchEvent(new Event("resize"));
                }, 140);
                window.setTimeout(function () {
                    window.__pdfDebugLog("event.dispatch", {
                        name: name,
                        type: "beforeprint",
                    });
                    window.dispatchEvent(new Event("beforeprint"));
                }, 380);
            }

            function run() {
                attempts += 1;
                window.__pdfDebugLog("schedule.run", {
                    name: name,
                    attempt: attempts,
                });
                const ready = initFn(attempts);
                window.__pdfDebugLog("schedule.result", {
                    name: name,
                    attempt: attempts,
                    ready: ready !== false,
                });
                if (ready === false && attempts < maxAttempts) {
                    window.__markReportTask(name, {
                        attempts: attempts,
                        completed: false,
                        success: false,
                    });
                    window.setTimeout(run, 160);
                    return;
                }
                window.__markReportTask(name, {
                    attempts: attempts,
                    completed: true,
                    success: ready !== false,
                });
                finalize();
            }

            function schedule() {
                window.__pdfDebugLog("schedule.queue", {
                    name: name,
                });
                window.__pdfDebugLog("schedule.timeout_run", {
                    name: name,
                    delayMs: 100,
                });
                window.setTimeout(run, 100);
            }

            if (document.readyState === "loading") {
                window.__pdfDebugLog("schedule.wait_load", {
                    name: name,
                });
                window.addEventListener("load", schedule, { once: true });
            } else {
                schedule();
            }
        };

        window.__writePdfDebugSnapshot = function () {
            let debugNode = document.getElementById("pdf-debug-json");
            if (!debugNode) {
                debugNode = document.createElement("script");
                debugNode.type = "application/json";
                debugNode.id = "pdf-debug-json";
                document.body.appendChild(debugNode);
            }
            debugNode.textContent = JSON.stringify({
                generatedAt: new Date().toISOString(),
                events: window.__pdfDebug.events,
                tasks: window.__reportChartTasks,
                counts: {
                    liveSvgCount: document.querySelectorAll('svg').length,
                    frozenSvgCount: document.querySelectorAll('.report-chart-print-svg').length,
                    frozenImgCount: document.querySelectorAll('.report-chart-print-image').length,
                }
            });
        };

        window.addEventListener("load", function () {
            window.__pdfDebugLog("window.load", {
                readyDelayMs: window.__pdfDebug.readyDelayMs,
            });
            window.setTimeout(function () {
                const taskNames = Object.keys(window.__reportChartTasks);
                window.__pdfDebugLog("window.ready_check", {
                    taskNames: taskNames,
                    allDone: window.__allReportTasksDone(),
                    tasks: window.__reportChartTasks,
                    liveSvgCount: document.querySelectorAll('svg').length,
                    frozenSvgCount: document.querySelectorAll('.report-chart-print-svg').length,
                    frozenImgCount: document.querySelectorAll('.report-chart-print-image').length,
                });
                window.status = "ready";
                window.__pdfDebugLog("window.ready", {
                    status: window.status,
                });
                window.__writePdfDebugSnapshot();
            }, window.__pdfDebug.readyDelayMs);
        }, { once: true });
    </script>
    <script>
        window.__freezeReportCharts = function (sectionName, charts, chartTargets) {
            window.__pdfDebugLog("freeze.start", {
                section: sectionName,
                chartCount: charts.length,
                targetCount: chartTargets.length,
            });

            return new Promise(function (resolve) {
                window.requestAnimationFrame(function () {
                    window.requestAnimationFrame(function () {
                        charts.forEach(function (chart, index) {
                            const target = chartTargets[index];
                            if (!chart || !target) {
                                window.__pdfDebugLog("freeze.skip", {
                                    section: sectionName,
                                    index: index,
                                    hasChart: !!chart,
                                    hasTarget: !!target,
                                });
                                return;
                            }

                            let frozenMarkup = "";
                            if (typeof chart.renderToSVGString === "function") {
                                frozenMarkup = chart.renderToSVGString();
                            }

                            let dataUrl = "";
                            if (!frozenMarkup && typeof chart.getDataURL === "function") {
                                dataUrl = chart.getDataURL({
                                    type: "png",
                                    pixelRatio: 2,
                                    excludeComponents: ["toolbox"],
                                }) || "";
                            }

                            if (typeof chart.dispose === "function") {
                                chart.dispose();
                            }

                            target.innerHTML = "";
                            if (frozenMarkup) {
                                target.innerHTML = frozenMarkup;
                                const svg = target.querySelector("svg");
                                if (svg) {
                                    svg.classList.add("report-chart-print-svg");
                                }
                                window.__pdfDebugLog("freeze.svg", {
                                    section: sectionName,
                                    index: index,
                                    svgLength: frozenMarkup.length,
                                    targetId: target.id || null,
                                });
                                return;
                            }

                            if (dataUrl) {
                                const img = document.createElement("img");
                                img.src = dataUrl;
                                img.alt = "";
                                img.className = "report-chart-print-image";
                                target.appendChild(img);
                                window.__pdfDebugLog("freeze.png", {
                                    section: sectionName,
                                    index: index,
                                    dataUrlLength: dataUrl.length,
                                    targetId: target.id || null,
                                });
                                return;
                            }

                            window.__pdfDebugLog("freeze.empty", {
                                section: sectionName,
                                index: index,
                                targetId: target.id || null,
                            });
                        });

                        window.__pdfDebugLog("freeze.end", {
                            section: sectionName,
                        });
                        resolve();
                    });
                });
            });
        };
    </script>
    <style>
        {% include "assets/report_pdf.css" %}
    </style>
    <style>
        @page {
            size: A4 portrait;
            margin: 10mm 8mm;
        }

        @page landscape-page {
            size: A4 landscape;
            margin: 8mm;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            background: #ffffff;
        }

        body {
            font-size: 10.5px;
            line-height: 1.35;
            color: #0f172a;
        }

        .report-container {
            max-width: none;
            margin: 0;
            padding: 0;
            background: #ffffff;
            border-radius: 0;
            box-shadow: none;
        }

        .report-header-top,
        .report-header-v3,
        .report-header-divider,
        .period-strip-v1,
        .section-header,
        .electricity-subsection-title {
            break-after: avoid;
            page-break-after: avoid;
        }

        .report-header-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, #cbd5e1, transparent);
            margin: 12px 0 14px;
        }

        .period-strip-v1 {
            margin-bottom: 18px;
        }

        .period-strip-table {
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid #dbeafe;
            background: #ffffff;
        }

        .period-strip-cell {
            background: #ffffff;
        }

        .period-strip-cell:nth-child(odd) {
            background: #f8fbff;
        }

        .report-section {
            margin-bottom: 12px;
            padding-top: 0;
            break-inside: auto !important;
            page-break-inside: auto !important;
        }

        .report-table-wrap,
        .surface-table-wrap,
        .electricity-total-card,
        .kpi-plant-card {
            box-shadow: none !important;
        }

        .report-table-wrap,
        .surface-table-wrap {
            overflow: visible !important;
            max-height: none !important;
            border-radius: 8px;
        }

        .report-table-ui,
        .surface-table,
        .period-strip-table {
            width: 100%;
            table-layout: fixed;
        }

        .report-table-ui thead,
        .surface-table thead {
            display: table-header-group;
        }

        .report-table-ui tfoot,
        .surface-table tfoot {
            display: table-footer-group;
        }

        .report-table-ui th,
        .report-table-ui td,
        .surface-table th,
        .surface-table td {
            padding: 5px 6px !important;
            font-size: 9px !important;
            line-height: 1.25;
            white-space: normal;
            word-break: break-word;
        }

        .report-table-ui thead th,
        .surface-table thead th {
            position: static !important;
            top: auto !important;
            left: auto !important;
            z-index: auto !important;
            font-size: 8.5px !important;
            background: #f8fafc !important;
            box-shadow: none !important;
        }

        .sticky-date-col,
        .sticky-rank,
        .sticky-meter {
            position: static !important;
            left: auto !important;
            background: inherit !important;
        }

        .electricity-total-grid,
        .kpi-total-grid {
            gap: 8px;
            margin-bottom: 10px;
        }

        .electricity-total-value-group {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 1px;
        }

        .daily-highlight-header .section-header {
            background: linear-gradient(180deg, #eef5ff 0%, #f7fbff 100%);
            border: 1px solid #c9dcff;
            border-left: 5px solid #2c63c7;
            border-radius: 12px;
            padding: 10px 14px 8px;
            box-shadow: none;
        }

        .daily-highlight-header .section-header h2 {
            font-size: 18px;
        }

        .daily-highlight-header .section-subtitle {
            margin-left: 0;
        }

        .daily-highlight-header .section-meta-row {
            margin-left: 0;
        }

        .electricity-total-card,
        .kpi-plant-card {
            padding: 9px 10px;
            border-radius: 8px;
        }

        .electricity-total-card-title,
        .kpi-plant-card-title,
        .electricity-subsection-title {
            margin-bottom: 8px;
        }

        .electricity-total-value,
        .kpi-plant-value {
            font-size: 13.5px;
        }

        .electricity-total-label,
        .kpi-plant-label {
            font-size: 11px;
        }

        .electricity-total-ratio {
            display: block;
            font-size: 8px;
            font-weight: 600;
            line-height: 1.05;
            color: #6b7280;
        }

        .electricity-total-ratio .electricity-inline-ratio {
            margin-left: 0;
        }

        .section-header {
            margin-bottom: 10px;
            padding-bottom: 6px;
        }

        .section-header h2 {
            font-size: 16px;
        }

        .section-subtitle {
            font-size: 10px;
        }

        .status-pill {
            min-width: 58px;
            padding: 2px 6px;
            font-size: 8px;
        }

        .value,
        .electricity-inline-ratio,
        .electricity-inline-ratio-table,
        .pct {
            display: inline;
            white-space: nowrap;
        }

        .electricity-inline-ratio,
        .electricity-inline-ratio-table,
        .pct {
            font-size: 7px !important;
            margin-left: 2px !important;
        }

        .electricity-comparison-table .col-current,
        .electricity-comparison-table .col-previous,
        .electricity-top10-table .col-current,
        .electricity-top10-table .col-previous,
        .electricity-daily-summary-table .col-top1-value,
        .electricity-daily-summary-table .col-total-energy,
        .electricity-daily-summary-table .col-avg-active {
            white-space: nowrap;
        }

        .electricity-top10-table,
        .electricity-daily-summary-table,
        .electricity-daily-detail-table,
        .utility-total-table,
        .utility-detail-table,
        .kpi-area-table,
        .kpi-product-table,
        .kpi-daily-detail-table {
            min-width: 0 !important;
        }

        .electricity-daily-detail-table td,
        .utility-detail-table td,
        .kpi-daily-detail-table td {
            text-align: center;
        }

        .electricity-daily-detail-table th,
        .electricity-daily-detail-table td {
            white-space: nowrap;
        }

        .electricity-daily-detail-table .col-date,
        .utility-detail-table .col-date,
        .kpi-daily-detail-table td:first-child {
            text-align: left;
        }

        .pdf-section-opening,
        .pdf-keep-together,
        .utility-total-block,
        .kpi-total-block,
        .kpi-product-block,
        .electricity-detail-block,
        .electricity-daily-summary-block {
            break-inside: avoid;
            page-break-inside: avoid;
        }

        .pdf-landscape-block {
            page: landscape-page;
            break-before: page;
            page-break-before: always;
        }

        .pdf-landscape-block .report-table-ui th,
        .pdf-landscape-block .report-table-ui td {
            padding: 4px 5px !important;
            font-size: 8px !important;
        }

        .pdf-landscape-block .section-header,
        .pdf-landscape-block .electricity-subsection-title {
            break-after: avoid;
            page-break-after: avoid;
        }

        .pdf-landscape-block .col-date {
            min-width: 78px !important;
        }

        .kpi-daily-detail-table .col-date {
            width: 112px !important;
            min-width: 112px !important;
            white-space: nowrap;
        }

        .electricity-daily-detail-block,
        .electricity-daily-detail-table-block,
        .utility-detail-block,
        .kpi-daily-detail-block {
            break-inside: auto;
            page-break-inside: auto;
        }

    </style>
</head>
<body class="pdf-render-mode">
    <div class="report-container">
        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
