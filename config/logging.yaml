
version: 1

disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.FileHandler
    level: INFO
    formatter: standard
    filename: logs/app.log
    encoding: utf-8

root:
  level: INFO
  handlers: [console, file]

loggers:
  app:
    level: INFO
    handlers: [console, file]
    propagate: false

  app.db:
    level: INFO
    handlers: [console, file]
    propagate: false

  app.services:
    level: INFO
    handlers: [console, file]
    propagate: false

  app.utils:
    level: INFO
    handlers: [console, file]
    propagate: false
